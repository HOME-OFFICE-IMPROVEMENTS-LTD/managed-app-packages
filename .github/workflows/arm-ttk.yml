name: arm-ttk Validation

on:
  push:
    branches: [ main, feat/**, fix/** ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    name: Validate ARM Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Install arm-ttk
        shell: pwsh
        run: |
          Install-Module -Name arm-ttk -Force -Scope CurrentUser

      - name: Run Test-AzTemplate on changed packages
        shell: pwsh
        run: |
          $failed = $false
          $packages = Get-ChildItem -Directory | Where-Object {
            Test-Path (Join-Path $_.FullName "mainTemplate.json")
          }
          foreach ($pkg in $packages) {
            Write-Host "Testing $($pkg.Name)..."
            $results = Test-AzTemplate -TemplatePath $pkg.FullName
            $failures = $results | Where-Object { -not $_.Passed -and -not $_.Warned }
            if ($failures.Count -gt 0) {
              $failed = $true
              Write-Host "FAILED: $($pkg.Name)" -ForegroundColor Red
              $failures | ForEach-Object { Write-Host "  -> $($_.Name)" }
            } else {
              Write-Host "PASSED: $($pkg.Name) ($($results.Count) tests)" -ForegroundColor Green
            }
          }
          if ($failed) { exit 1 }
